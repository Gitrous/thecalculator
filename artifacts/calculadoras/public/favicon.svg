<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13B466"/>
      <stop offset="1" stop-color="#0C9A4E"/>
    </linearGradient>
  </defs>
  <style>
    /* ── 8 second cycle ────────────────────────────────────── */

    /* Screen: idle green → brightens during typing → bright on result */
    .screen { animation: screen-cycle 8s ease infinite; }
    @keyframes screen-cycle {
      0%,  16%, 100% { fill: #0C9A4E; }
      20%            { fill: #11BB56; }
      24%            { fill: #0C9A4E; }
      28%            { fill: #11BB56; }
      32%            { fill: #0C9A4E; }
      36%            { fill: #11BB56; }
      40%            { fill: #0C9A4E; }
      44%            { fill: #11BB56; }
      52%            { fill: #0C9A4E; }
      57%            { fill: #1AD06A; }
      73%            { fill: #1AD06A; }
      78%            { fill: #0C9A4E; }
    }

    /* Cursor blink — shown when screen is idle (0-17% and 80-100%) */
    .cursor {
      fill: #6EFFC0;
      animation: cursor-blink 8s ease infinite;
    }
    @keyframes cursor-blink {
      0%         { opacity: 1; }
      7%         { opacity: 0; }
      14%        { opacity: 1; }
      17%        { opacity: 0; }
      79%        { opacity: 0; }
      83%        { opacity: 1; }
      87%        { opacity: 0; }
      93%        { opacity: 1; }
      100%       { opacity: 1; }
    }

    /* "24×7" — appears 18–49% */
    .t-eq {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 11px;
      text-anchor: end;
      dominant-baseline: middle;
      fill: #6EFFC0;
      opacity: 0;
      animation: show-eq 8s ease infinite;
    }
    @keyframes show-eq {
      0%,  17%  { opacity: 0; }
      20%        { opacity: 1; }
      47%        { opacity: 1; }
      51%        { opacity: 0; }
      100%       { opacity: 0; }
    }

    /* "168" — appears 54–75% */
    .t-result {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 11px;
      text-anchor: end;
      dominant-baseline: middle;
      fill: #DDFFF0;
      opacity: 0;
      animation: show-result 8s ease infinite;
    }
    @keyframes show-result {
      0%,  53%  { opacity: 0; }
      57%        { opacity: 1; }
      72%        { opacity: 1; }
      77%        { opacity: 0; }
      100%       { opacity: 0; }
    }

    /* Button presses — each at a different point in the cycle */
    .b1 { animation: pb1 8s linear infinite; }
    @keyframes pb1 {
      0%, 19%, 24%, 100% { fill: #0FA958; }
      21%                { fill: #7BFFD4; }
    }
    .b2 { animation: pb2 8s linear infinite; }
    @keyframes pb2 {
      0%, 25%, 30%, 100% { fill: #0FA958; }
      27%                { fill: #7BFFD4; }
    }
    .b3 { animation: pb3 8s linear infinite; }
    @keyframes pb3 {
      0%, 31%, 36%, 100% { fill: #0FA958; }
      33%                { fill: #7BFFD4; }
    }
    .b4 { animation: pb4 8s linear infinite; }
    @keyframes pb4 {
      0%, 37%, 42%, 100% { fill: #0FA958; }
      39%                { fill: #7BFFD4; }
    }
    .b5 { fill: #0FA958; }

    /* = button: orange pulse at ~50% */
    .beq { animation: pb-eq 8s ease infinite; }
    @keyframes pb-eq {
      0%, 49%, 57%, 100% { fill: #FF6A00; }
      52%                { fill: #FFA040; }
    }
  </style>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Calculator body -->
  <rect x="48" y="32" width="84" height="116" rx="16" fill="#FFFFFF"/>

  <!-- Screen -->
  <rect class="screen" x="62" y="46" width="56" height="26" rx="6"/>

  <!-- Blinking cursor (shown when idle) -->
  <rect class="cursor" x="107" y="64" width="6" height="2" rx="1"/>

  <!-- Equation text -->
  <text class="t-eq" x="113" y="59">24×7</text>

  <!-- Result text -->
  <text class="t-result" x="113" y="59">168</text>

  <!-- Buttons row 1 -->
  <circle class="b1" cx="68"  cy="92" r="7"/>
  <circle class="b2" cx="90"  cy="92" r="7"/>
  <circle class="b3" cx="112" cy="92" r="7"/>

  <!-- Buttons row 2 -->
  <circle class="b4" cx="68"  cy="118" r="7"/>
  <circle class="b5" cx="90"  cy="118" r="7"/>
  <circle class="beq" cx="112" cy="118" r="7"/>
</svg>
